version: 2

models:
  - name: dim_security
    description: >
      Conformed security dimension. One row per ticker. Descriptive attributes only —
      no metrics. Used as the shared dimension across all gold fact tables.
    columns:
      - name: ticker
        tests: [not_null, unique]
      - name: company_name
        tests: [not_null]
      - name: sector
        tests: [not_null]
      - name: market_index
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['S&P 100', 'ASX 200']

  - name: fact_security_snapshot
    description: >
      Per-ticker snapshot combining risk metrics (computed from the full price history)
      with Yahoo Finance valuation multiples. One row per security. Enterprise value and
      EV/EBITDA are derived using current market_cap joined to the latest annual net_debt.
    columns:
      - name: ticker
        tests: [not_null, unique]
      - name: trading_days
        tests: [not_null]
      - name: annualised_return
        tests: [not_null]
      - name: annualised_volatility
        tests: [not_null]

  - name: fact_annual_financials
    description: >
      Annual financial statements for all available fiscal years. One row per
      (ticker, fiscal_year). Sourced from silver__financials. ASX tickers typically
      have lower metric coverage than US tickers due to yfinance data availability.
    columns:
      - name: ticker
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]
      - name: period_end
        tests: [not_null]

  - name: fact_return_covariance
    description: >
      Pairwise log-return correlation and annualised covariance matrix for MPT portfolio
      construction. One row per (ticker_a, ticker_b) including self-pairs (diagonal = 1.0).
      Lookback defaults to 252 trading days; override with dbt variable
      covariance_lookback_days. sector_a / sector_b are denormalised to support
      cross-sector filtering without requiring USERELATIONSHIP on the inactive
      ticker_b → dim_security relationship in the semantic model.
    columns:
      - name: ticker_a
        tests: [not_null]
      - name: ticker_b
        tests: [not_null]
      - name: correlation
        tests: [not_null]
      - name: common_trading_days
        tests: [not_null]
