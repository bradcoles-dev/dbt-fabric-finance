version: 2

models:
  - name: bronze__daily_prices
    description: >
      Thin view over raw_daily_prices. Exposes the full ingested price history
      with no transformation. Use silver__daily_prices for cleaned, renamed columns.
    columns:
      - name: ticker
        tests: [not_null]
      - name: date_
        tests: [not_null]
      - name: close_
        tests: [not_null]

  - name: bronze__company_info
    description: >
      Thin view over raw_company_info. One row per ticker, point-in-time snapshot
      of Yahoo Finance fundamentals.
    columns:
      - name: ticker
        tests: [not_null, unique]

  - name: bronze__financials
    description: >
      Thin view over raw_financials. Long/EAV format — one row per
      (ticker, period_end, statement_type, metric_name).
    columns:
      - name: ticker
        tests: [not_null]
      - name: period_end
        tests: [not_null]
      - name: statement_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [income_statement, balance_sheet, cash_flow]
      - name: metric_name
        tests: [not_null]
